<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🎓 Dashboard</h2>
    <ul>
      <li onclick="showSection('students')">Students</li>
      <li onclick="showSection('marks')">Marks</li>
      <li onclick="showSection('attendance')">Attendance</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- STUDENT SECTION -->
    <div id="studentSection">
      <h1>Student Management</h1>

      <div class="form-box">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="course" placeholder="Course">
        <button onclick="addStudent()">Add</button>
      </div>

      <div class="list-box">
        <h2>Students</h2>
        <ul id="studentList"></ul>
      </div>
    </div>

    <!-- MARKS SECTION -->
    <div id="marksSection" style="display:none;">
      <h1>Marks</h1>
      <p>Marks feature coming soon 📊</p>
    </div>

    <!-- ATTENDANCE SECTION -->
    <div id="attendanceSection" style="display:none;">
      <h1>Attendance</h1>
      <p>Attendance feature coming soon 📅</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
