<!DOCTYPE html>
<html ng-app="studentApp">
<head>
    <title>Student Record</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        /* Background */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Main container */
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Inputs */
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        /* Button */
        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Error text */
        .error {
            color: red;
            font-size: 12px;
            display: block;
            text-align: left;
            margin-left: 15px;
        }

        /* Table */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        h3 {
            margin-top: 20px;
            color: #444;
        }
    </style>
</head>

<body ng-controller="studentController">

<div class="container">

    <h2>Student Record</h2>

    <form name="studentForm" novalidate>

        <!-- Name -->
        <input type="text" name="name" ng-model="student.name" placeholder="Enter Name" required>
        <span class="error" ng-show="studentForm.name.$touched && studentForm.name.$invalid">
            Name is required
        </span>

        <!-- Age -->
        <input type="number" name="age" ng-model="student.age" placeholder="Enter Age" min="1" max="100" required>
        <span class="error" ng-show="studentForm.age.$touched && studentForm.age.$invalid">
            Enter valid age (1-100)
        </span>

        <!-- Email -->
        <input type="email" name="email" ng-model="student.email" placeholder="Enter Email" required>
        <span class="error" ng-show="studentForm.email.$touched && studentForm.email.$invalid">
            Enter valid email
        </span>

        <!-- Button -->
        <button ng-click="addStudent()" ng-disabled="studentForm.$invalid">
            Add Student
        </button>

    </form>

    <!-- Student List -->
    <h3>Student List</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Email</th>
        </tr>

        <tr ng-repeat="s in students">
            <td>{{s.name}}</td>
            <td>{{s.age}}</td>
            <td>{{s.email}}</td>
        </tr>
    </table>

</div>

<script>
    var app = angular.module("studentApp", []);

    app.controller("studentController", function($scope) {

        $scope.students = [];

        $scope.addStudent = function() {
            if ($scope.studentForm.$valid) {
                $scope.students.push({
                    name: $scope.student.name,
                    age: $scope.student.age,
                    email: $scope.student.email
                });

                $scope.student = {};
                $scope.studentForm.$setPristine();
                $scope.studentForm.$setUntouched();
            }
        };

    });
</script>

</body>
</html>
